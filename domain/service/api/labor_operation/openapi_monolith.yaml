  /labor-operations/{laborOperationKey}/commands:
    post:
      tags:
      - Default
      summary: Execute a business workflow on LaborOperation
      description: Single entry point for all LaborOperation state-changing intents.
      operationId: executeLaborOperationCommand
      parameters:
      - name: laborOperationKey
        in: path
        required: true
        schema:
          type: string
      requestBody:
        description: Command intent and parameters
        content:
          application/json:
            schema:
              required:
              - type
              - method
              - params
              - id
              type: object
              properties:
                type:
                  type: string
                  description: jsonrpc
                  default: jsonrpc
                jsonrpc:
                  type: string
                  example: "2.0"
                  default: "2.0"
                method:
                  type: string
                  description: star.order.update)
                id:
                  type: string
                  description: "match the response with request. If omitted, Notification\
                    \ the server will not respond."
                version:
                  type: string
                  description: "2.0"
                workflow_state:
                  type: string
                  description: "The intent of the command (e.g., CREATED, DELETED)"
                  enum:
                  - CREATED
                  - DELETED
                context:
                  type: object
                  additionalProperties: true
                  description: context payload required for this specific command
                    type
                params:
                  $ref: "#/components/schemas/LaborOperation"
      responses:
        "200":
          description: Commands processing complete
          headers:
            Link:
              description: HATEOAS link to discover state-aware transitions and business
                constraints.
              schema:
                type: string
                example: "</capabilities{?state,role}>; rel=\"capabilities\""
            Location:
              description: The URI of the newly created resource.
              schema:
                type: string
                example: "/labor-operations/{laborOperationKey}/commands/4492105704843379825"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: The execution status of the command
                    example: SUCCESS
                    enum:
                    - SUCCESS
                    - FAILED
                    - PENDING
                    - PROCESSING
                    - VALIDATION_ERROR
                    - PARTIAL_SUCCESS
                    - REQUIRES_ACTION
                    - MITIGATION_APPLIED
                  message:
                    type: string
                    description: A human-readable summary or error detail
                    example: "Invoice #249d489a has been successfully cancelled."
                  command_id:
                    type: string
                    description: The tracking ID for this specific command execution
                    format: identifier
                  code:
                    type: string
                    description: detailed code for workflow business processing
                    example: 08ecf194
                  retry_after:
                    type: string
                    description: "For PENDING or PROCESSING statuses, retry_after\
                      \ (integer, seconds) "
                  retryable:
                    type: boolean
                    description: "If true, the agent can attempt this command again\
                      \ immediately"
                    example: false
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "412":
          $ref: "#/components/responses/PreconditionFailedError"
        "500":
          $ref: "#/components/responses/ServerError"
  /labor-operations/{laborOperationKey}/commands/{commandId}:
    get:
      tags:
      - Default
      summary: Poll LaborOperation command status
      description: Check the progress or result of a previously submitted command.
      operationId: getLaborOperationCommandStatus
      parameters:
      - name: laborOperationKey
        in: path
        required: true
        schema:
          type: string
          format: string
      - name: commandId
        in: path
        required: true
        schema:
          type: string
          format: string
      responses:
        "200":
          description: Current status of the command
          content:
            application/json:
              schema:
                type: object
                properties:
                  command_id:
                    type: string
                    description: The unique identifier for the command being tracked
                    format: uuid
                    readOnly: true
                  status:
                    type: string
                    description: The current lifecycle state of the command
                    enum:
                    - PENDING
                    - PROCESSING
                    - SUCCESS
                    - FAILED
                    - REQUIRES_ACTION
                  progress:
                    maximum: 100
                    minimum: 0
                    type: integer
                    description: Percentage of completion (0-100)
                    format: int32
                  message:
                    type: string
                    description: Status update or error message
                  result:
                    type: object
                    additionalProperties: true
                    description: The final output of the command (only populated on
                      SUCCESS)
                  errors:
                    type: array
                    items:
                      $ref: "#/components/schemas/ErrorDetail"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/ServerError"
  /labor-operations/capabilities:
    get:
      tags:
      - Default
      summary: Discover LaborOperation Capabilities
      description: Standard GET operation for /labor-operations/capabilities
      operationId: getLaborOperationCapabilities
      parameters:
      - name: include
        in: query
        description: "Comma-separated list of sections to include (e.g., 'commands,exports,constraints')"
        schema:
          type: array
          items:
            type: string
            enum:
            - COMMANDS
            - EXPORTS
            - CONSTRAINTS
      - name: role
        in: query
        description: Filter capabilities by the agent's current role(s)
        schema:
          type: string
          example: ACCOUNTANT
      - name: state
        in: query
        description: Filter commands and constraints relevant only to a specific aggregate
          state
        required: true
        schema:
          type: string
          example: ACTIVE
      responses:
        "200":
          description: Successful discovery response (may be partial based on filters)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Capabilities"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/ServerError"
